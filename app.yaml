# =============================================================================
# DOCUMENTATION ONLY - This file is NOT used during deployment!
# =============================================================================
#
# The actual app.yaml is generated from:
#   packages/databricks-tellr/databricks_tellr/_templates/app.yaml.template
#
# This file exists only as a reference for understanding the app configuration.
# =============================================================================

# Databricks App Configuration
name: "ai-slide-generator"
description: "AI-powered slide deck generator using LLMs and Genie"

command:
  - "sh"
  - "-c"
  - |
    pip install -r requirements.txt && python -m databricks_tellr_app.run

env:
  # Core settings (auto-configured during deployment)
  - name: ENVIRONMENT
    value: "production"
  - name: DATABRICKS_HOST
    valueFrom: "system.databricks_host"
  - name: DATABRICKS_TOKEN
    valueFrom: "system.databricks_token"
  
  # Lakebase settings (auto-configured during deployment)
  - name: LAKEBASE_INSTANCE
    value: "<set-by-deploy-script>"
  - name: LAKEBASE_SCHEMA
    value: "<set-by-deploy-script>"
  
  # ==========================================================================
  # Identity Provider Configuration
  # ==========================================================================
  # Controls how users/groups are listed for adding as profile contributors.
  # Priority: Account API > Workspace API > Local table
  #
  # To enable, set the appropriate token value in the TEMPLATE file:
  #   packages/databricks-tellr/databricks_tellr/_templates/app.yaml.template
  # ==========================================================================
  
  # Option 1: Account Admin (cross-workspace)
  # Required: All three must be set
  - name: DATABRICKS_ACCOUNT_HOST
    value: ""  # e.g., "https://accounts.cloud.databricks.com"
  - name: DATABRICKS_ACCOUNT_ID
    value: ""  # Your Databricks account ID
  - name: DATABRICKS_ACCOUNT_ADMIN_TOKEN
    value: ""  # Account admin PAT
  
  # Option 2: Workspace Admin (single workspace)
  # Required: Just the token (uses DATABRICKS_HOST from above)
  - name: DATABRICKS_WORKSPACE_ADMIN_TOKEN
    value: ""  # Workspace admin PAT
  
  # Option 3: Local table (default)
  # No configuration needed - only shows users who have signed into the app
