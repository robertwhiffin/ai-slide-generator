[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "databricks-tellr-app"
version = "0.3.12"
description = "Tellr application package for Databricks Apps"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "fastapi==0.121.2",
    "uvicorn==0.38.0",
    "python-multipart==0.0.20",
    "pydantic==2.12.4",
    "pydantic-settings==2.12.0",
    "databricks-langchain==0.9.0",
    "langchain==1.0.5",
    "langchain-core==1.0.4",
    "langchain-community==0.4.1",
    "langchain-text-splitters==1.0.0",
    "litellm==1.80.11",
    "mcp==1.27.0",
    "opentelemetry-api==1.38.0",
    "opentelemetry-sdk==1.38.0",
    "beautifulsoup4==4.14.2",
    "lxml==6.0.2",
    "tinycss2==1.3.0",
    "esprima==4.0.1",
    "sqlalchemy==2.0.36",
    "psycopg2-binary==2.9.10",
    "databricks-sql-connector>=3.0.0",
    "httpx==0.28.1",
    "jinja2==3.1.2",
    "python-dotenv==1.2.1",
    "pyyaml==6.0.1",
    "pandas==2.3.3",
    "python-pptx==0.6.23",
    "playwright==1.48.0",
    "Pillow>=10.0.0",
    "google-api-python-client>=2.100.0",
    "google-auth-oauthlib>=1.2.0",
    "google-auth-httplib2>=0.2.0",
    "cryptography>=42.0.0",
    "sse-starlette>=3.0.0",
    # --- Resolver-speedup pins: the backtracking-driver cluster ---
    # Databricks Apps installs this wheel in a platform-managed BUILD phase with a
    # ~10-minute budget. Left ranged, the databricks-langchain ->
    # mlflow[databricks] -> databricks-agents graph (with unbounded
    # databricks-ai-bridge / databricks-vectorsearch) sends pip's resolver into
    # heavy backtracking as new versions land on PyPI, which blows the budget and
    # fails the deploy ("App process did not start within 10 minutes"). These
    # exact pins are a known-good resolution (proven on db-tellr-dev-pinfix,
    # July 2026) that short-circuits the search. All are available on the
    # Databricks build proxy; leaf transitives are intentionally left ranged so
    # the Apps base image can satisfy them (hard-pinning the full closure fights
    # the base image and pins versions the proxy mirror doesn't carry). Refresh
    # via a devloop deploy if these constraints change. Formerly injected at
    # deploy time as _RESOLVER_SPEEDUP_PINS; now carried in the wheel so a bare
    # `pip install databricks-tellr-app` is safe.
    "databricks-sdk==0.120.0",
    "mlflow[databricks]==3.14.0",
    "mlflow-skinny==3.14.0",
    "databricks-agents==1.11.0",
    "databricks-ai-bridge==0.21.0",
    "databricks-ai-search==0.76",
    "databricks-connect==16.1.7",
    "databricks-vectorsearch==0.75",
    "langchain-classic==1.0.0",
    "langgraph==1.0.10",
    "langgraph-prebuilt==1.0.10",
    "langsmith==0.9.5",
    "unitycatalog-ai==0.3.2",
    "unitycatalog-langchain==0.3.0",
]
