<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; img-src data:;">
  <meta charset="UTF-8">
  <title>Text control slide</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html, body {
      width: 1280px;
      height: 720px;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
    }
  </style>
</head>
<body>
  <div class="slide" style="position:relative;width:1280px;height:720px;background:#ffffff;">
    <h1 style="position:absolute;left:88px;top:72px;width:800px;font-size:40px;color:#0B3D66;">Control Slide</h1>
    <p style="position:absolute;left:88px;top:200px;width:700px;font-size:20px;color:#333333;">No vector content on this slide.</p>
  </div>
</body>
</html>
