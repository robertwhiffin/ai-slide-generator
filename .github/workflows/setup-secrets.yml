# Setup Databricks secrets from GitHub secrets
# Run this workflow manually or as part of deployment
#
# Prerequisites:
# 1. Add these GitHub secrets (per environment):
#    - DATABRICKS_HOST: Workspace URL
#    - DATABRICKS_TOKEN: Deployment token (with secrets:write permission)
#    - WORKSPACE_ADMIN_TOKEN: The admin PAT to store in Databricks secrets
#
# 2. (Optional) For account-level identity:
#    - DATABRICKS_ACCOUNT_ID
#    - ACCOUNT_ADMIN_TOKEN

name: Setup Databricks Secrets

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to configure'
        required: true
        type: choice
        options:
          - development
          - staging
          - production

jobs:
  setup-secrets:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    
    steps:
      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          
      - name: Configure Databricks CLI
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          echo "Configuring for: $DATABRICKS_HOST"
          
      - name: Create secret scope (if not exists)
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          databricks secrets create-scope tellr-secrets 2>/dev/null || echo "Scope already exists"
          
      - name: Set workspace admin token
        if: ${{ secrets.WORKSPACE_ADMIN_TOKEN != '' }}
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          echo "${{ secrets.WORKSPACE_ADMIN_TOKEN }}" | databricks secrets put-secret tellr-secrets workspace-admin-token
          echo "✓ Workspace admin token configured"
          
      - name: Set account admin token (optional)
        if: ${{ secrets.ACCOUNT_ADMIN_TOKEN != '' }}
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          echo "${{ secrets.ACCOUNT_ADMIN_TOKEN }}" | databricks secrets put-secret tellr-secrets account-admin-token
          echo "${{ secrets.DATABRICKS_ACCOUNT_ID }}" | databricks secrets put-secret tellr-secrets account-id
          echo "✓ Account admin credentials configured"
          
      - name: Verify secrets
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          echo "Configured secrets in tellr-secrets scope:"
          databricks secrets list-secrets tellr-secrets

