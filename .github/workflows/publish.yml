name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Extract and validate versions
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Tag version: $TAG_VERSION"

          TELLR_VERSION=$(python3 -c "
          import tomllib, pathlib
          print(tomllib.loads(pathlib.Path('packages/databricks-tellr/pyproject.toml').read_text())['project']['version'])
          ")
          APP_VERSION=$(python3 -c "
          import tomllib, pathlib
          print(tomllib.loads(pathlib.Path('packages/databricks-tellr-app/pyproject.toml').read_text())['project']['version'])
          ")

          echo "databricks-tellr version: $TELLR_VERSION"
          echo "databricks-tellr-app version: $APP_VERSION"

          if [ "$TAG_VERSION" != "$TELLR_VERSION" ]; then
            echo "ERROR: Tag v$TAG_VERSION does not match databricks-tellr version $TELLR_VERSION"
            exit 1
          fi
          if [ "$TAG_VERSION" != "$APP_VERSION" ]; then
            echo "ERROR: Tag v$TAG_VERSION does not match databricks-tellr-app version $APP_VERSION"
            exit 1
          fi

          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "All versions match: $TAG_VERSION"

  build:
    name: Build Packages
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install build tools
        run: pip install build

      - name: Build huashu bootstrap artifacts
        # Produces services/pptx-emit-huashu/{node_modules,sys-libs-bullseye}.tar.gz
        # which setup.py copies into the wheel's _assets/sidecars/pptx-emit-huashu/.
        # setup.sh extracts them at boot on the deployed app. Apt-downloads
        # Bullseye runtime libs (libnspr4, libnss3, etc.) for Chromium.
        run: bash services/pptx-emit-huashu/build-artifacts.sh

      - name: Build databricks-tellr
        run: python -m build --sdist --wheel packages/databricks-tellr

      - name: Build databricks-tellr-app
        run: |
          cp -r src packages/databricks-tellr-app/src
          TELLR_INCLUDE_HUASHU_SIDECAR=1 python -m build --sdist --wheel packages/databricks-tellr-app
          rm -rf packages/databricks-tellr-app/src

      - name: Verify built artifacts (huashu tarballs present, wheel >= 25MB)
        run: |
          echo "databricks-tellr:"
          ls -lh packages/databricks-tellr/dist/
          echo ""
          echo "databricks-tellr-app:"
          ls -lh packages/databricks-tellr-app/dist/
          python - <<'PY'
          import glob, os, sys, zipfile
          wheels = glob.glob("packages/databricks-tellr-app/dist/*.whl")
          if len(wheels) != 1:
              sys.exit(f"ERROR: expected exactly one wheel, found: {wheels}")
          wheel = wheels[0]
          size_mb = os.path.getsize(wheel) / (1024 * 1024)
          print(f"Wheel: {wheel} ({size_mb:.1f} MB)")
          base = "databricks_tellr_app/_assets/sidecars/pptx-emit-huashu"
          required = [f"{base}/node_modules.tar.gz", f"{base}/sys-libs-bullseye.tar.gz"]
          with zipfile.ZipFile(wheel) as zf:
              names = set(zf.namelist())
          missing = [n for n in required if n not in names]
          if missing:
              sys.exit("ERROR: wheel missing huashu tarball(s): " + ", ".join(missing))
          if size_mb < 25:
              sys.exit(f"ERROR: wheel is {size_mb:.1f} MB, under the 25MB floor")
          print("Verify gate passed.")
          PY

      - name: Upload tellr dist
        uses: actions/upload-artifact@v4
        with:
          name: dist-tellr
          path: packages/databricks-tellr/dist/

      - name: Upload tellr-app dist
        uses: actions/upload-artifact@v4
        with:
          name: dist-tellr-app
          path: packages/databricks-tellr-app/dist/

  publish-tellr:
    name: Publish databricks-tellr
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist-tellr
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-tellr-app:
    name: Publish databricks-tellr-app
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist-tellr-app
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
